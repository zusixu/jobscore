# ============================================
# Nginx配置参考模板
# ============================================
# 注意: 部署时需要根据实际情况修改以下内容:
# 1. 替换 DOMAIN_NAME 为实际的域名
# 2. 替换 CERT_PATH 为实际的证书路径  
# 3. 替换 WEB_ROOT 为实际的Web根目录

# 根据部署脚本，建议使用以下路径配置：
# - DOMAIN_NAME: your-domain.com (从 .env.deployment 中定义)
# - CERT_PATH: /etc/letsencrypt/live/your-domain.com
# - WEB_ROOT: /var/www/job-score/dist 或 /usr/share/nginx/html (Docker内部)

upstream frontend {
    server 127.0.0.1:4173;
}

server {
    listen 80;
    listen [::]:80;
    # ⚠️ 需要替换为实际域名
    server_name DOMAIN_NAME www.DOMAIN_NAME;

    # HTTP重定向到HTTPS（生产环境）
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    # ⚠️ 需要替换为实际域名
    server_name DOMAIN_NAME www.DOMAIN_NAME;

    # ⚠️ 需要替换为实际的证书路径
    ssl_certificate CERT_PATH/fullchain.pem;
    ssl_certificate_key CERT_PATH/privkey.pem;

    # SSL优化
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # 安全头
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # 日志路径 (Docker环境下映射到宿主机)
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # ⚠️ 需要替换为实际的Web根目录
    # Docker环境下通常为 /usr/share/nginx/html
    # 宿主机环境下通常为 /var/www/job-score/dist
    root WEB_ROOT;

    # 静态文件缓存（长期缓存对带hash的文件）
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # HTML不缓存
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # 默认文件和路由
    location / {
        try_files $uri $uri/ /index.html;
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Gzip压缩
    gzip on;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript;
    gzip_min_length 1000;
    gzip_comp_level 6;
    gzip_vary on;
}